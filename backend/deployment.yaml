---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: app1-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels: backend
    spec:
      containers:
        - name: backend
          image: 
          ports:
            - containerPort: 5000
...
